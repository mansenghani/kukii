<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <defs>
    <!-- Gradient for background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B76E79"/>
      <stop offset="100%" stop-color="#A05B66"/>
    </linearGradient>

    <!-- Gradient for plate -->
    <radialGradient id="plateGradient" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#F5E6E0" stop-opacity="0.9"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bgGradient)"/>

  <!-- Plate -->
  <circle
    cx="32"
    cy="32"
    r="22"
    stroke="url(#plateGradient)"
    stroke-width="4"
    fill="none"
    opacity="0.9"
  />

  <!-- Inner plate ring -->
  <circle
    cx="32"
    cy="32"
    r="18"
    fill="none"
    stroke="#ffffff"
    stroke-width="1.5"
    opacity="0.5"
  />

  <!-- Letter K -->
  <g stroke="#ffffff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <line x1="26" y1="22" x2="26" y2="42"/>
    <line x1="26" y1="32" x2="36" y2="22"/>
    <line x1="26" y1="32" x2="36" y2="42"/>
  </g>

</svg>